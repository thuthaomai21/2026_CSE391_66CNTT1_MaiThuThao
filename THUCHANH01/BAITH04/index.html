<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài thực hành </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<form class = "employee-form">
    <h2>Basic Info</h2>
    <div class="form-group">
        <label>Employee ID</label>
        <input type="text" value="9">
    </div>

    <div class="form-group">
        <label>Last Name</label>
        <input type="text" value="Dodsworth">
    </div>

    <div class="form-group">
        <label>First Name</label>
        <input type="text" value="Anne">
    </div>

    <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
            <label><input type="radio" name="gender"> Male</label>
            <label><input type="radio" name="gender" > Female</label>
            <label><input type="radio" name="gender">XXX</label>
            <label><input type="radio" name="gender"checked>ZZZ</label>
        </div>
    </div>

    <div class="form-group">
        <label>Title</label>
        <input type="text" value="Sales Representative">
    </div>

    <div class="form-group">
        <label>Sufix</label>
        <input type="text" value="MS.">
    </div>

    <div class="form-group">
        <label>Birth Date</label>
        <input type="datetime-local" value="1969-07-02T00:00">
    </div>

    <div class="form-group">
        <label>Hire Date</label>
        <input type="datetime-local" value="1994-11-15T00:00">
    </div>

    <div class="form-group">
        <label>SSN # (if applicable)</label>
        <input type="text" value="">
    </div>

    <div class="form-group">
        <label>Reports To</label>
        <select>
            <option>Buchanan</option>
        </select>
    </div>

    <h2>Contact Info</h2>
    <div class="form-group">
        <label>Email</label>
        <input type="email" value="name@example.com">
    </div>

    <div class="form-group">
        <label>Address</label>
        <input type="text" value="7 Houndstooth Rd.">
    </div>

    <div class="form-group">
        <label>City</label>
        <input type="text" value="London">
    </div>

    <div class="form-group">
        <label>Region</label>
        <input type="text" value="">
    </div>

    <div class="form-group">
        <label>Postal Code</label>
        <input type="text" value="WG2 7LT">
    </div>

    <div class="form-group">
        <label>Country</label>
        <select>
            <option>Russian Federation</option>
        </select>
    </div>

    <div class="form-group">
        <label>US Home Phone</label>
        <input type="text" value="(234)234-2342">
    </div>

    <div class="form-group">
        <label>Photo</label>
        <input type="text" value="EmpID9.bmp">
    </div>

    <h2>Optional Info</h2>
    <div class="form-group">
        <label>Notes</label>
        <textarea rows="4">
Anne has a BA degree in English from St. Lawrence College.
She is fluent in French and German.
        </textarea>
    </div>

    <div class="form-group">
        <label>Preferred Shift</label>
        <div class="checkbox-group">
            <label><input type="checkbox"> Regular</label>
            <label><input type="checkbox" checked> Graveyard</label>
  </div>
    </div>

    <div class="form-group">
        <label>Active?</label>
        <label><input type="checkbox" checked></label>
    </div>

    <div class="form-group captcha">
        <label>Are you human?</label>
        <div class="captcha-box">
            <span class="captcha-text">TIDAWO</span>
            <button type="button" class="captcha-refresh">Click to change</button>
        </div>
    </div>

    <div class="form-actions">
        <div class="nav-buttons">
            <button>◀</button>
            <button>▶</button>
        </div>

        <div class="action-buttons">
            <button>Submit</button>
            <button>Cancel</button>
        </div>
    </div>

</form>
</body>
</html>
