<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">

<body>

        <div class="logo">HR Management</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Contact</a>
        </nav>
        <div class="search-box">
            <input type="text" placeholder="Search...">
            <button>Search</button>
        </div>
    </header>

    <div class="container">
    <div class="header-row">
    <h2>Employee</h2>
    <button class="btn-primary">+ Add</button>
    </div>

    <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Position</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>Fatima Beatriz</td>

        <td>0985674321</td>
        <td>Staff</td>
        <td>
          <button class="btn-edit">Edit</button>
          <button class="btn-delete">Delete</button>
        </td>
      </tr>
      <tr>
        <td>2</td>

        <td>
          <button class="btn-edit">Edit</button>
          <button class="btn-delete">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
</div>

<div class="modal">
  <div class="modal-header">New Employee</div>
  <div class="modal-body">
    <div class="form-row">
      <label>Name</label>
      <input type="text" >
      <label>Email</label>
      <input type="email" >
    </div>
    <div class="form-row">
      <label>Phone</label> 
      <input type="text" >
      <label>Position</label> 
      <select>
        <option>-- Select Position --</option>
        <option>Staff</option>
        <option>Manager</option>
        <option>CEO</option>
      </select>
    </div>
    <div class="form-row">
      <label>Sex:</label>
      <label><input type="radio" name="sex"> Male</label>
      <label><input type="radio" name="sex"> Female</label>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-save">Save</button>
    <button class="btn-cancel">Cancel</button>
  </div>
</div>

</body>
</html>
